services:
  postgres:
    image: postgres:17-alpine
    container_name: shippublic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shippublic
      POSTGRES_PASSWORD: shippublic
      POSTGRES_DB: shippublic
    ports:
      - "5432:5432"
    volumes:
      - shippublic_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shippublic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - shippublic_redis:/data

volumes:
  shippublic_pg:
  shippublic_redis:
